<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found &middot; Reef</title>
    <script src="/assets/js/_tailwind.4.0.js"></script>
    <style type="text/tailwindcss">
        @variant dark (&:where(.dark, .dark *));
    </style>
    <script src="/assets/js/_lucide.0.552.0.js"></script>
    <script src="/assets/js/main.js"></script>
    <link rel="stylesheet" type="text/css" href="/assets/css/main.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up {
            animation: fadeUp 0.4s ease-out forwards;
            opacity: 0;
        }
        .dot-grid {
            background-image: radial-gradient(circle, rgba(148,163,184,0.15) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        .disable-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="antialiased">

<div class="grid min-h-screen lg:grid-cols-2">

    <!--  Left: error panel  -->
    <div class="flex flex-col bg-white">
        <!-- Logo -->
        <div class="flex justify-center md:justify-start px-8 pt-8">
            <a href="/index" class="flex items-center gap-2.5 select-none" tabindex="-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 stroke-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                    <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                    <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                </svg>
                <span class="text-sm font-semibold text-slate-900 tracking-tight">Reef</span>
            </a>
        </div>

        <!-- Centered content -->
        <div class="flex flex-1 items-center justify-center px-6 py-10">
            <div class="fade-up w-full max-w-sm text-center space-y-6">

                <div class="flex justify-center">
                    <div class="h-14 w-14 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center">
                        <i data-lucide="search-x" class="h-7 w-7 text-slate-500"></i>
                    </div>
                </div>

                <div class="space-y-1.5 disable-select">
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Page not found</h1>
                    <p class="text-sm text-slate-500">The page you're looking for doesn't exist or has been moved.</p>
                </div>

                <div class="flex gap-3 pt-2">
                    <a href="/index" class="flex-1 h-9 flex items-center justify-center gap-2 px-4 text-sm font-medium text-slate-700 bg-white border border-slate-200 rounded-md transition-all hover:bg-slate-50 active:scale-[0.98]">
                        <i data-lucide="home" class="h-4 w-4"></i>
                        Home
                    </a>
                    <button onclick="window.history.back()" class="flex-1 h-9 flex items-center justify-center gap-2 px-4 text-sm font-medium text-slate-700 bg-white border border-slate-200 rounded-md transition-all hover:bg-slate-50 active:scale-[0.98]">
                        <i data-lucide="arrow-left" class="h-4 w-4"></i>
                        Go back
                    </button>
                </div>
            </div>
        </div>

        <div class="px-8 pb-6 text-center md:text-left">
            <p class="text-xs text-slate-400 disable-select">
            &copy; <a href="https://github.com/melosso/reef" target="_blank" rel="noopener noreferrer" class="hover:text-slate-500 transition-colors">Reef</a> 
            &middot; 
            <a href="https://github.com/melosso/reef/blob/main/LICENSE" target="_blank" rel="noopener noreferrer" class="hover:text-slate-500 transition-colors">AGPL-3.0</a>
            </p>
        </div>
    </div>

    <!-- Right panel -->
    <div class="hidden lg:flex flex-col items-center justify-center relative bg-slate-900 overflow-hidden">
        <div class="absolute inset-0 dot-grid"></div>
        <div class="absolute top-0 right-0 w-[500px] h-[400px] bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-[400px] h-[300px] bg-indigo-500/10 rounded-full blur-[100px] pointer-events-none"></div>

        <div class="relative z-10 flex flex-col items-center text-center px-12 max-w-md space-y-8 hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 stroke-blue-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
            </svg>
            <div class="space-y-3">
                <h2 class="text-2xl font-bold text-white tracking-tight">Lost in the waves.</h2>
                <p class="text-sm text-slate-400 leading-relaxed">The page you're looking for has drifted beyond the reef. Let's get you back on course.</p>
            </div>
        </div>
    </div>

</div>

<script>
    queueLucideRender();
</script>
</body>
</html>
