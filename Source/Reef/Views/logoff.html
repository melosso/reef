<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signed Out &middot; Reef</title>
    <script src="/assets/js/_tailwind.4.0.js"></script>
    <style type="text/tailwindcss">
        @variant dark (&:where(.dark, .dark *));
    </style>
    <script src="/assets/js/_lucide.0.552.0.js"></script>
    <script src="/assets/js/main.js"></script>
    <link rel="stylesheet" type="text/css" href="/assets/css/main.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up {
            animation: fadeUp 0.4s ease-out forwards;
            opacity: 0;
        }
        .dot-grid {
            background-image: radial-gradient(circle, rgba(148,163,184,0.15) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        .disable-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="antialiased">

<div class="grid min-h-screen lg:grid-cols-2">

    <!--  Left: signed-out panel  -->
    <div class="flex flex-col bg-white">
        <!-- Logo -->
        <div class="flex justify-center md:justify-start px-8 pt-8">
            <a href="/index" class="flex items-center gap-2.5 select-none" tabindex="-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 stroke-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                    <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                    <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                </svg>
                <span class="text-sm font-semibold text-slate-900 tracking-tight">Reef</span>
            </a>
        </div>

        <!-- Centered content -->
        <div class="flex flex-1 items-center justify-center px-6 py-10">
            <div class="fade-up w-full max-w-sm text-center space-y-6">

                <div class="flex justify-center">
                    <div class="h-14 w-14 rounded-full bg-green-50 border border-green-100 flex items-center justify-center">
                        <i data-lucide="circle-check" class="h-7 w-7 text-green-600"></i>
                    </div>
                </div>

                <div class="space-y-1.5 disable-select">
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Signed out</h1>
                    <p class="text-sm text-slate-500">You have been securely signed out.<br>Redirecting to sign in…</p>
                </div>

                <!-- Progress bar -->
                <div class="w-full bg-slate-100 rounded-full h-0.5 overflow-hidden">
                    <div id="redirect-progress" class="h-0.5 bg-slate-300 rounded-full transition-all duration-100" style="width: 0%"></div>
                </div>

                <a href="/index" class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
                    Sign in now
                    <i data-lucide="arrow-right" class="h-3.5 w-3.5"></i>
                </a>
            </div>
        </div>

        <div class="px-8 pb-6 text-center md:text-left">
            <p class="text-xs text-slate-400 disable-select">&copy; Reef &middot; Data Integration Platform</p>
        </div>
    </div>

    <!-- Right panel -->
    <div class="hidden lg:flex flex-col items-center justify-center relative bg-slate-900 overflow-hidden">
        <div class="absolute inset-0 dot-grid"></div>
        <div class="absolute top-0 right-0 w-[500px] h-[400px] bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-[400px] h-[300px] bg-indigo-500/10 rounded-full blur-[100px] pointer-events-none"></div>

        <div class="relative z-10 flex flex-col items-center text-center px-12 max-w-md space-y-8 hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 stroke-blue-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
            </svg>
            <div class="space-y-3">
                <h2 class="text-2xl font-bold text-white tracking-tight">See you next time.</h2>
                <p class="text-sm text-slate-400 leading-relaxed">Your session has ended securely. All local credentials have been cleared.</p>
            </div>
        </div>
    </div>

</div>

<script>
    queueLucideRender();
</script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof window.queueLucideRender === 'function') {
            window.queueLucideRender();
        } else if (typeof window.lucide !== 'undefined' && window.lucide.createIcons) {
            window.lucide.createIcons();
        }

        // Session termination
        (async function executeLogoff() {
            try {
                await fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
            } catch (err) {
                console.warn('Backend logout API request failed:', err);
            }
        })();

        // Client-side state clearance
        localStorage.removeItem('reef_token');
        localStorage.removeItem('reef_username');
        localStorage.removeItem('reef_role');
        localStorage.removeItem('reef_display_name');

        // Animated progress bar + redirect
        const progressBar = document.getElementById('redirect-progress');
        const totalMs = 2200;
        const tickMs = 40;
        let elapsed = 0;
        const timer = setInterval(() => {
            elapsed += tickMs;
            const pct = Math.min((elapsed / totalMs) * 100, 100);
            if (progressBar) progressBar.style.width = pct + '%';
            if (elapsed >= totalMs) {
                clearInterval(timer);
                document.body.style.transition = 'opacity 0.25s ease-in';
                document.body.style.opacity = '0';
                setTimeout(() => { window.location.href = '/index'; }, 260);
            }
        }, tickMs);
    });
</script>
</body>
</html>
