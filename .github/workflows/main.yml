name: Build and Push As Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.3.2)'
        required: true
        type: string

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_PATH: 'Source/Reef.slnx'
  PROJECT_PATH: 'Source/Reef/Reef.csproj'
  SOURCE_DIR: 'Source/Reef'
  PUBLISH_WIN: 'publish_win'
  PUBLISH_LIN: 'publish_lin'
  TAG_NAME: ${{ github.event.inputs.tag_name }}

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clear NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: none
          restore-keys: none

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dependencies
        run: |
          dotnet tool install -g dotnet-project-licenses

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ env.TAG_NAME }}" -m "Release ${{ env.TAG_NAME }}"
          git push origin "${{ env.TAG_NAME }}"

      - name: Restore and build
        run: |
          echo "Working directory: $(pwd)"
          echo "Looking for solution at: ${{ env.SOLUTION_PATH }}"
          ls -la Source/ || true
          echo ""
          echo "Restoring solution..."
          dotnet clean ${{ env.SOURCE_DIR }} -c Release || true
          dotnet restore ${{ env.SOLUTION_PATH }}
          echo ""
          echo "Building solution..."
          dotnet build ${{ env.SOLUTION_PATH }} -c Release --no-restore

      - name: Publish Windows (win-x64)
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            --framework net10.0 \
            -o ${{ env.PUBLISH_WIN }}

      - name: Publish Linux (linux-x64)
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            --framework net10.0 \
            -o ${{ env.PUBLISH_LIN }}

      - name: Create deployment structure
        run: |
          for dir in ${{ env.PUBLISH_WIN }} ${{ env.PUBLISH_LIN }}; do
            mkdir -p "$dir/exports" "$dir/log" "$dir/.core" "$dir/license/packages"
            cp LICENSE "$dir/license/LICENSE.txt" || true
            cp README.md "$dir/" || true
            echo "https://github.com/${{ github.repository }}" > "$dir/license/source.txt"
          done

      - name: Shared cleanup
        run: |
          for dir in ${{ env.PUBLISH_WIN }} ${{ env.PUBLISH_LIN }}; do
            # Debug files
            rm -f "$dir"/*.pdb "$dir"/*.xml "$dir"/*.deps.json

            # Language/locale satellite assembly folders (e.g. cs/, de/, pt-BR/, zh-Hans/)
            find "$dir" -mindepth 1 -maxdepth 1 -type d \
              -regextype posix-extended -regex '.*/[a-z]{2}(-[A-Za-z]{2,4})?' \
              -exec rm -rf {} + || true

            # Endpoint and environment-specific files
            rm -f "$dir"/*.staticwebassets.endpoints.json \
                  "$dir"/appsettings.Development.json

            # IIS meta file (not used)
            rm -f "$dir"/web.config
          done

      - name: Generate third-party licenses
        run: |
          dotnet-project-licenses \
            --input ${{ env.PROJECT_PATH }} \
            --export-license-texts \
            --output-directory ${{ env.PUBLISH_WIN }}/license/packages \
            || echo "Warning: Could not generate package licenses"
          cp -r ${{ env.PUBLISH_WIN }}/license/packages \
                ${{ env.PUBLISH_LIN }}/license/

      - name: Create version files
        run: |
          for dir in ${{ env.PUBLISH_WIN }} ${{ env.PUBLISH_LIN }}; do
            echo "${{ env.TAG_NAME }}" > "$dir/.version.txt"
            echo "Built: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> "$dir/.version.txt"
            echo "Commit: ${{ github.sha }}" >> "$dir/.version.txt"
          done

      - name: Create Windows service script
        run: |
          cat > ${{ env.PUBLISH_WIN }}/Reef.bat << 'EOFBAT'
          @echo off
          setlocal enabledelayedexpansion

          set SERVICE_NAME=ReefExportService
          set DISPLAY_NAME=Reef Export Service
          set DESCRIPTION=Enterprise data export and automation service
          set EXE_PATH=%~dp0Reef.exe

          if "%1"=="" goto :usage

          if /i "%1"=="install" goto :install
          if /i "%1"=="uninstall" goto :uninstall
          if /i "%1"=="start" goto :start
          if /i "%1"=="stop" goto :stop
          if /i "%1"=="restart" goto :restart
          if /i "%1"=="status" goto :status
          if /i "%1"=="test" goto :test
          goto :usage

          :install
            echo Installing Reef Service...
            sc create "%SERVICE_NAME%" ^
              binPath= "\"%EXE_PATH%\"" ^
              start= auto ^
              displayname= "%DISPLAY_NAME%"

            if !ERRORLEVEL! EQU 0 (
              sc description "%SERVICE_NAME%" "%DESCRIPTION%"
              echo ✓ Service installed successfully
              echo Run '%~nx0 start' to start the service
            ) else (
              echo ✗ Installation failed. Run as Administrator.
            )
            goto :eof

          :uninstall
            echo Stopping service...
            sc stop "%SERVICE_NAME%" >nul 2>&1
            timeout /t 3 /nobreak >nul

            echo Uninstalling Reef Service...
            sc delete "%SERVICE_NAME%"

            if !ERRORLEVEL! EQU 0 (
              echo ✓ Service uninstalled successfully
            ) else (
              echo ✗ Uninstall failed. Run as Administrator.
            )
            goto :eof

          :start
            echo Starting Reef Service...
            sc start "%SERVICE_NAME%"

            if !ERRORLEVEL! EQU 0 (
              echo ✓ Service started successfully
              echo Access web UI at: http://localhost:8085
            ) else (
              echo ✗ Failed to start service
            )
            goto :eof

          :stop
            echo Stopping Reef Service...
            sc stop "%SERVICE_NAME%"

            if !ERRORLEVEL! EQU 0 (
              echo ✓ Service stopped successfully
            ) else (
              echo ✗ Failed to stop service
            )
            goto :eof

          :restart
            call :stop
            timeout /t 3 /nobreak >nul
            call :start
            goto :eof

          :status
            echo Reef Service Status:
            echo ====================
            sc query "%SERVICE_NAME%"
            echo.
            echo Recent logs:
            if exist "%~dp0log\reef-*.log" (
              powershell -Command "Get-Content '%~dp0log\reef-*.log' -Tail 20"
            ) else (
              echo No logs found
            )
            goto :eof

          :test
            echo Running Reef in console mode...
            echo Press Ctrl+C to stop
            echo.
            echo Web UI will be available at: http://localhost:8085
            echo.
            "%EXE_PATH%"
            goto :eof

          :usage
            echo Reef Export Service Manager
            echo ============================
            echo.
            echo Usage: %~nx0 {command}
            echo.
            echo Commands:
            echo   install   - Install as Windows service (requires Admin)
            echo   uninstall - Remove Windows service (requires Admin)
            echo   start     - Start the service
            echo   stop      - Stop the service
            echo   restart   - Restart the service
            echo   status    - Show service status and recent logs
            echo   test      - Run in console mode for testing
            echo.
            goto :eof
          EOFBAT

      - name: Create Windows README
        run: |
          cat > ${{ env.PUBLISH_WIN }}/README.txt << 'EOFREADME'
          ╔═══════════════════════════════════════════════════════════╗
          ║                  REEF EXPORT SERVICE                      ║
          ║                      Version 2.0                          ║
          ╚═══════════════════════════════════════════════════════════╝

          PREREQUISITES
          =============

          ** REQUIRED: .NET 10.0 Runtime **
          Download from: https://dotnet.microsoft.com/download/dotnet/10.0
          Install "ASP.NET Core Runtime 10.0.x" for Windows x64

          QUICK START
          ===========

          1. TEST MODE (Recommended First)
             Run: Reef.bat test
             Access: http://localhost:8085
             Stop: Press Ctrl+C

          2. INSTALL AS WINDOWS SERVICE
             Run as Administrator: Reef.bat install
             Start service: Reef.bat start
             Access: http://localhost:8085

          3. DEFAULT LOGIN
             Username: admin
             Password: (set on first login)

          CONFIGURATION
          =============

          Required Configuration:
          - Set encryption key (HIGHLY RECOMMENDED):
            Set Windows environment variable:
            REEF_ENCRYPTION_KEY=your-secure-random-key-here

          - Edit appsettings.json for:
            * Port (default: 8085)
            * JWT secret
            * SMTP settings
            * Export path

          SERVICE MANAGEMENT
          ==================

          Reef.bat commands:
            install   - Install Windows service (requires Admin)
            start     - Start the service
            stop      - Stop the service
            restart   - Restart the service
            status    - Show status and recent logs
            uninstall - Remove Windows service (requires Admin)
            test      - Run in console mode

          FOLDER STRUCTURE
          ================

          exports/     - Exported data files (configurable)
          log/         - Application logs (Serilog)
          .core/       - Encryption keys (DO NOT DELETE)
          wwwroot/     - Web UI static files
          Reef.db      - SQLite database

          TROUBLESHOOTING
          ===============

          Service won't start:
          1. Run: Reef.bat test (check console errors)
          2. Check logs in: log/reef-YYYYMMDD.log
          3. Verify port 8085 is available
          4. Ensure REEF_ENCRYPTION_KEY is set

          Web UI not accessible:
          1. Check service status: Reef.bat status
          2. Verify firewall allows port 8085
          3. Try: http://localhost:8085/health

          SECURITY NOTES
          ==============

          - Set REEF_ENCRYPTION_KEY environment variable
          - Change default JWT secret in appsettings.json
          - Use HTTPS in production (reverse proxy)
          - Backup Reef.db regularly
          - Backup .core/ folder (encryption keys)
          - Limit network access to port 8085

          DOCUMENTATION
          =============

          Full documentation: https://github.com/${{ github.repository }}
          API Reference: http://localhost:8085/

          LICENSE
          =======

          AGPL-3.0-or-later
          See license/LICENSE.txt

          SUPPORT
          =======

          Issues: https://github.com/${{ github.repository }}/issues
          EOFREADME

      - name: Create Linux README
        run: |
          cat > ${{ env.PUBLISH_LIN }}/README.txt << 'EOFREADME'
          ╔═══════════════════════════════════════════════════════════╗
          ║                  REEF EXPORT SERVICE                      ║
          ║                      Version 2.0                          ║
          ╚═══════════════════════════════════════════════════════════╝

          PREREQUISITES
          =============

          ** REQUIRED: .NET 10.0 Runtime **
          Download from: https://dotnet.microsoft.com/download/dotnet/10.0
          Install "ASP.NET Core Runtime 10.0.x" for Linux x64

          Or via package manager (Debian/Ubuntu):
            sudo apt-get install -y dotnet-runtime-10.0

          QUICK START
          ===========

          1. Make the binary executable (if not already):
             chmod +x ./Reef

          2. TEST MODE (Recommended First)
             Run: ./Reef
             Access: http://localhost:8085
             Stop: Press Ctrl+C

          3. DEFAULT LOGIN
             Username: admin
             Password: (set on first login)

          CONFIGURATION
          =============

          Required Configuration:
          - Set encryption key (HIGHLY RECOMMENDED):
            export REEF_ENCRYPTION_KEY=your-secure-random-key-here

          - Edit appsettings.json for:
            * Port (default: 8085)
            * JWT secret
            * SMTP settings
            * Export path

          SYSTEMD SERVICE (Optional)
          ==========================

          Create /etc/systemd/system/reef.service:

            [Unit]
            Description=Reef Export Service
            After=network.target

            [Service]
            Type=notify
            WorkingDirectory=/opt/reef
            ExecStart=/opt/reef/Reef
            Restart=always
            RestartSec=10
            Environment=REEF_ENCRYPTION_KEY=your-key-here

            [Install]
            WantedBy=multi-user.target

          Then:
            sudo systemctl daemon-reload
            sudo systemctl enable reef
            sudo systemctl start reef

          FOLDER STRUCTURE
          ================

          exports/     - Exported data files (configurable)
          log/         - Application logs (Serilog)
          .core/       - Encryption keys (DO NOT DELETE)
          wwwroot/     - Web UI static files
          Reef.db      - SQLite database

          TROUBLESHOOTING
          ===============

          Service won't start:
          1. Run: ./Reef (check console errors)
          2. Check logs in: log/reef-YYYYMMDD.log
          3. Verify port 8085 is available
          4. Ensure REEF_ENCRYPTION_KEY is set

          Web UI not accessible:
          1. Check service status: systemctl status reef
          2. Verify firewall allows port 8085
          3. Try: http://localhost:8085/health

          SECURITY NOTES
          ==============

          - Set REEF_ENCRYPTION_KEY environment variable
          - Change default JWT secret in appsettings.json
          - Use HTTPS in production (reverse proxy recommended: nginx/caddy)
          - Backup Reef.db regularly
          - Backup .core/ folder (encryption keys)
          - Limit network access to port 8085

          DOCUMENTATION
          =============

          Full documentation: https://github.com/${{ github.repository }}
          API Reference: http://localhost:8085/

          LICENSE
          =======

          AGPL-3.0-or-later
          See license/LICENSE.txt

          SUPPORT
          =======

          Issues: https://github.com/${{ github.repository }}/issues
          EOFREADME

      - name: Set Linux binary permissions
        run: chmod +x ${{ env.PUBLISH_LIN }}/Reef

      - name: Create archives and checksums
        run: |
          TAG="${{ env.TAG_NAME }}"

          ( cd ${{ env.PUBLISH_WIN }} && zip -r "../Reef-${TAG}-Windows_x64.zip" . )
          sha256sum "Reef-${TAG}-Windows_x64.zip" > "Reef-${TAG}-Windows_x64.zip.sha256"

          ( cd ${{ env.PUBLISH_LIN }} && zip -r "../Reef-${TAG}-Linux_x64.zip" . )
          sha256sum "Reef-${TAG}-Linux_x64.zip" > "Reef-${TAG}-Linux_x64.zip.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            Reef-${{ env.TAG_NAME }}-Windows_x64.zip
            Reef-${{ env.TAG_NAME }}-Windows_x64.zip.sha256
            Reef-${{ env.TAG_NAME }}-Linux_x64.zip
            Reef-${{ env.TAG_NAME }}-Linux_x64.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reef-${{ env.TAG_NAME }}
          path: |
            Reef-${{ env.TAG_NAME }}-Windows_x64.zip
            Reef-${{ env.TAG_NAME }}-Linux_x64.zip
          retention-days: 90
